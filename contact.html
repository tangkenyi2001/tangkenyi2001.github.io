    <nav id="hamburger-nav">
        <div class="logo">Ken Yi</div>
        <div class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
               <span></span>

    <div class="contact_us">
        <div class="responsive-container-block container">
          
          <form class="form-box" action="https://formspree.io/f/mayggkeg" method="POST">
            <p class="text-blk contact-head">
              Contact Me
            </p>
            
            <div class="container-block form-wrapper">
              <div class="responsive-container-block">
                <div class="responsive-cell-block wk-ipadp-6 wk-tab-12 wk-mobile-12 wk-desk-6" id="i10mt-4">
                  <p class="text-blk input-title">
                    First Name
                  </p>
                  <input class="input" type="text" name="FirstName" required>
                </div>
                <div class="responsive-cell-block wk-desk-6 wk-ipadp-6 wk-tab-12 wk-mobile-12">
                  <p class="text-blk input-title">
                    Last Name
                  </p>
                  <input class="input" type="text" name="Last Name">
                </div>
                <div class="responsive-cell-block wk-desk-6 wk-ipadp-6 wk-tab-12 wk-mobile-12">
                  <p class="text-blk input-title">
                    Email
                  </p>
                  <input class="input" type="text" name="Email" required>
                </div>
                <div class="responsive-cell-block wk-desk-6 wk-ipadp-6 wk-tab-12 wk-mobile-12">
                  <p class="text-blk input-title">
                    Phone No.
                  </p>
                  <input class="input" type="text" name="Phone Number" >
                </div>
                <div class="responsive-cell-block wk-tab-12 wk-mobile-12 wk-desk-12 wk-ipadp-12" id="i634i-4">
                  <p class="text-blk input-title">
                    Message
                  </p>
                  <textarea class="textinput" type="text" name="Message" placeholder="Write your message..."></textarea>
                </div>
              </div>
              <button class="submit-btn">
                Send Message
              </button>
            </div>
          </form>
        </div>
    </div>
    <script src="script.js"></script>
